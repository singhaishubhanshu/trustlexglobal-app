<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TRUSTLEX Global | Premium Business Services</title>
  <meta name="robots" content="noindex">
  <script>
    (function () {
      // If the path is the site root, just serve the root
      if (location.pathname === '/' || location.pathname === '') {
        location.replace('/');
        return;
      }
      // Try to fetch the real index file and inject it so the SPA can route correctly.
      fetch('/index.html').then(function (r) { return r.text(); }).then(function (html) {
        document.open();
        document.write(html);
        document.close();
        // Ensure the original path remains visible in the address bar (no hash).
        history.replaceState({}, '', location.pathname + location.search + location.hash);
      }).catch(function (err) {
        // If anything goes wrong, fall back to the hash redirect to preserve functionality
        console.error('Failed to fetch index.html:', err);
        location.replace('/#' + location.pathname + location.search + location.hash);
      });
    })();
  </script>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
  <app-root></app-root>
</body>
</html>
