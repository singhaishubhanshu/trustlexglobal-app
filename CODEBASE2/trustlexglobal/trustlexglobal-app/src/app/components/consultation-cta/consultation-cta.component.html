<section class="section-padding bg-gradient-hero relative overflow-hidden" appScrollAnimation #ctaAnim="scrollAnim">
  
  <div style="background-image: radial-gradient(circle at 1px 1px, white 1px, transparent 0); background-size: 40px 40px;position: absolute;top: 0; right: 0; bottom: 0; left: 0; opacity: 0.03;"></div>
  <div style="position: absolute; top: 0; right: 0; width: 500px; height: 500px; border-radius: 50%; background-color: rgba(234, 179, 8, 0.05);filter: blur(120px);  pointer-events: none;"></div>

  <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.2); pointer-events: none;">
    
    <div class="cta relative max-w-4xl mx-auto text-center" [ngClass]="ctaAnim.isVisible ? 'visible' : ''">
      
      <div class="my-pill">
        <span claass="w-4 h-4 text-gold-400">📅</span>
        <span class="text-gold-400 text-xs tracking-wide uppercase font-medium">Complimentary Session</span>
      </div>

      <h2 class="my-heading">
        Ready to Build With Confidence?
      </h2>
      <p class="my-paragraph">
        Book a free strategy consultation. No obligations, no pressure — just expert guidance on the best path forward for your business.
      </p>

      <div class="my-container flex flex-col items-center justify-center gap-4 mb-12">
        <a routerLink="/contact" class="btn-gold text-base gap-2">
          Book Your Free Consultation
          <span class="w-4 h-4">→</span>
        </a>
      </div>

      <div class="my-grid">
        @for (item of benefits; track item) {
          <div style="display: flex; align-items: center;justify-content: center;gap: 0.5rem;">
            <span style="width: 1rem; height: 1rem;color: #fbbf24;flex-shrink: 0;display: flex;align-items: center; justify-content: center;">✓</span>
            <span style="font-size: 0.875rem;color: #d1d5db;">{{ item }}</span>
          </div>
        }
      </div>

    </div>
  </div>
</section>
