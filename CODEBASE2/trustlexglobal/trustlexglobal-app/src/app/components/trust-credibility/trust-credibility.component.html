<section class="section-padding bg-navy-50/30 border-y border-gray-100" appScrollAnimation #trustAnim="scrollAnim">
  <div class="max-w-7xl mx-auto">
    
    <div class="text-center max-w-3xl mx-auto mb-12 transition-all duration-700"
         [ngClass]="trustAnim.isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'">
      
      <div class="gold-line-center mb-6"></div>
      <span class="text-gold-600 font-sans text-xs tracking-[0.25em] uppercase font-medium block mb-4">
        Trust & Authority
      </span>
      <h2 class="headline-serif text-3xl md:text-4xl mb-6">
        Why Thousands Trust TRUSTLEX
      </h2>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-6 mb-16 transition-all duration-700 delay-200"
         [ngClass]="trustAnim.isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'">
         
      @for (badge of badges; track badge.label) {
        <div class="flex flex-col items-center text-center p-6 rounded-xl bg-white border border-gray-100 shadow-sm hover:shadow-navy hover:border-gold-200 transition-all duration-500">
          <span class="text-3xl mb-3">{{ badge.icon }}</span>
          <span class="text-xs font-semibold text-navy-800 leading-tight">{{ badge.label }}</span>
        </div>
      }
      
    </div>

    <div class="text-center transition-all duration-700 delay-400"
         [ngClass]="trustAnim.isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'">
         
      <p class="text-xs tracking-wider uppercase text-charcoal-400 font-medium mb-6">Recognized & Registered With</p>
      
      <div class="flex flex-wrap items-center justify-center gap-8">
        @for (logo of logos; track logo) {
          <div class="px-6 py-3 rounded-lg bg-white border border-gray-100 text-sm font-medium text-charcoal-500 hover:text-navy-700 hover:border-gold-200 transition-all duration-300">
            {{ logo }}
          </div>
        }
      </div>
      
    </div>
    
  </div>
</section>
