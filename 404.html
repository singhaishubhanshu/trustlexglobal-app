<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <meta name="robots" content="noindex">
  <script>
    (function () {
      var path = location.pathname;
      var search = location.search || '';
      var hash = location.hash || '';
      // If root, just go home
      if (path === '/' || path === '') {
        location.replace('/');
        return;
      }
      // Redirect to root + hash of original path so SPA can read it
      var target = '/' + '#'+ path + search + hash;
      location.replace(target);
    })();
  </script>
</head>
<body>
  Redirecting…
</body>
</html>
